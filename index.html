<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donation System | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">

    <h1>Donation Management System</h1>
    <p class="subtitle">Login to continue</p>

    <form id="loginForm">
        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="links">
        <a href="register.html">Create New Account</a>
        <a href="user-dashboard.html">Go to User Dashboard</a>
        <a href="admin-dashboard.html">Go to Admin Dashboard</a>
        <a href="donation.html">Make Donation</a>
    </div>

</div>

<script src="js/main.js"></script>
</body>
</html>
